<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xGOS.AI - AI运营团队工作台</title>
  <style>
    :root {
      --sidebar-width: 362px;
      --sidebar-bg: #f0f4ff;
      --page-bg: #fbfcfe;
      --surface: #ffffff;
      --text: #18191c;
      --muted: #9a9ea8;
      --line: #e4e6eb;
      --hover: rgba(45, 54, 74, 0.065);
      --primary: #2563eb;
      --danger: #f5222d;
      --shadow: 0 14px 34px rgba(30, 38, 58, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background: var(--page-bg);
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      color: inherit;
    }

    svg {
      display: block;
    }

    .app-shell {
      display: flex;
      width: 100%;
      height: 100vh;
      min-width: 980px;
      overflow: hidden;
      border: 1px solid #d9dce3;
      border-radius: 14px;
      background: var(--page-bg);
    }

    .sidebar {
      position: relative;
      flex: 0 0 var(--sidebar-width);
      width: var(--sidebar-width);
      height: 100%;
      padding: 28px 14px 92px;
      background: var(--sidebar-bg);
      overflow: hidden;
    }

    .sidebar-scroll {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
    }

    .sidebar-scroll::-webkit-scrollbar {
      display: none;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 7px 0 5px;
      margin-bottom: 24px;
    }

    .logo {
      font-size: 40px;
      line-height: 1;
      font-weight: 650;
      letter-spacing: -2.1px;
      color: #303237;
      white-space: nowrap;
    }

    .logo .x-mark {
      margin-right: 2px;
      font-size: 27px;
      font-weight: 500;
    }

    .collapse-button {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #595d64;
      cursor: default;
    }

    .new-chat {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      height: 49px;
      padding: 0 18px;
      margin-bottom: 18px;
      border: 0;
      border-radius: 7px;
      background: #fff;
      color: #2d5eff;
      font-size: 20px;
      cursor: default;
      box-shadow: 0 1px 1px rgba(45, 94, 255, 0.02);
    }

    .menu-list {
      display: grid;
      gap: 3px;
      margin-bottom: 15px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      height: 51px;
      padding: 0 18px;
      border-radius: 7px;
      font-size: 20px;
      user-select: none;
    }

    .menu-icon {
      display: grid;
      place-items: center;
      flex: 0 0 25px;
      width: 25px;
      height: 25px;
      margin-right: 15px;
      color: #27292d;
    }

    .letter-icon {
      border-radius: 50%;
      background: #292b2f;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      font-style: italic;
      line-height: 1;
    }

    .menu-chevron {
      margin-left: auto;
      color: #3c4047;
    }

    .sidebar-section {
      margin-top: 5px;
    }

    .section-title-row,
    .group-row,
    .history-row,
    .more-row {
      border-radius: 6px;
      transition: background-color 120ms ease;
    }

    .section-title-row:hover,
    .group-row:hover,
    .history-row:hover,
    .more-row:hover {
      background: var(--hover);
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 38px;
      padding: 0 15px;
      font-size: 18px;
      font-weight: 650;
    }

    .section-title-action {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      color: #666a72;
    }

    .group-list {
      position: relative;
    }

    .group-row,
    .more-row {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      height: 36px;
      padding: 0 14px 0 49px;
      border: 0;
      background: transparent;
      font-size: 16px;
      text-align: left;
      cursor: default;
    }

    .new-group-row {
      padding-left: 19px;
    }

    .new-group-plus {
      width: 24px;
      margin-right: 8px;
      font-size: 27px;
      font-weight: 300;
      line-height: 1;
      color: #3c4047;
    }

    .group-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .group-more-button,
    .history-more-button {
      display: grid;
      place-items: center;
      width: 30px;
      height: 28px;
      margin-left: auto;
      padding: 0;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: #4c5058;
      font-size: 20px;
      line-height: 1;
      letter-spacing: 1px;
      opacity: 0;
      cursor: pointer;
    }

    .group-row:hover .group-more-button,
    .group-row.menu-open .group-more-button,
    .history-row:hover .history-more-button,
    .history-row.menu-open .history-more-button {
      opacity: 1;
    }

    .group-more-button:hover,
    .history-more-button:hover {
      background: rgba(49, 56, 72, 0.08);
    }

    .more-row {
      gap: 13px;
      padding-left: 20px;
      cursor: pointer;
    }

    .more-row[hidden] {
      display: none;
    }

    .more-arrow {
      width: 12px;
      height: 12px;
      border-right: 1.5px solid #4c5058;
      border-bottom: 1.5px solid #4c5058;
      transform: rotate(45deg) translateY(-3px);
      transition: transform 160ms ease;
    }

    .more-row.is-expanded .more-arrow {
      transform: rotate(225deg) translate(-2px, -1px);
    }

    .group-action-menu {
      position: fixed;
      z-index: 50;
      width: 142px;
      padding: 5px;
      border: 1px solid #e0e2e7;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(25, 31, 45, 0.12);
    }

    .group-action-menu[hidden] {
      display: none;
    }

    .action-menu-item {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      height: 37px;
      padding: 0 10px;
      border: 0;
      border-radius: 5px;
      background: transparent;
      font-size: 15px;
      text-align: left;
      white-space: nowrap;
      cursor: default;
    }

    .action-menu-item:hover {
      background: #f4f5f7;
    }

    .action-menu-item + .action-menu-item {
      border-radius: 0;
    }

    .action-menu-item.danger {
      color: var(--danger);
    }

    .history-section {
      margin-top: 8px;
    }

    .history-period {
      padding: 10px 15px 6px;
      color: #969ba5;
      font-size: 15px;
    }

    .history-row {
      display: flex;
      align-items: center;
      height: 38px;
      padding: 0 9px 0 18px;
      font-size: 16px;
    }

    .history-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-footer {
      position: absolute;
      right: 14px;
      bottom: 17px;
      left: 14px;
      display: flex;
      align-items: center;
      height: 55px;
      padding: 0 5px;
      background: var(--sidebar-bg);
    }

    .avatar {
      flex: 0 0 48px;
      width: 48px;
      height: 48px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle at 62% 36%, #f4d3bb 0 11%, transparent 12%),
        radial-gradient(circle at 54% 48%, #945c3d 0 24%, transparent 25%),
        linear-gradient(135deg, #244c52, #d8aa76);
    }

    .phone {
      min-width: 0;
      margin-left: 8px;
      color: #464a52;
      font-size: 17px;
      white-space: nowrap;
    }

    .footer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .footer-icon {
      display: grid;
      place-items: center;
      width: 33px;
      height: 33px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: #343840;
    }

    .footer-icon.team {
      width: 48px;
      height: 48px;
      margin-left: -1px;
      background: #e4e9ff;
      color: #5b7cff;
    }

    .main {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      height: 100%;
      background: var(--page-bg);
    }

    .model-label {
      position: absolute;
      top: 41px;
      left: 36px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 17px;
      font-weight: 500;
    }

    .model-arrow {
      width: 8px;
      height: 8px;
      margin-top: -4px;
      border-right: 1.5px solid #222;
      border-bottom: 1.5px solid #222;
      transform: rotate(45deg);
    }

    .workspace {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(1116px, calc(100% - 100px));
      transform: translate(-50%, -43%);
    }

    .hero-title {
      margin: 0 0 43px;
      font-size: 40px;
      font-weight: 650;
      line-height: 1.25;
      letter-spacing: -1.2px;
      text-align: center;
    }

    .composer {
      position: relative;
      height: 187px;
      border: 1px solid #e1e3e8;
      border-radius: 35px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .composer textarea {
      width: 100%;
      height: 115px;
      padding: 26px 31px 10px;
      border: 0;
      outline: 0;
      resize: none;
      border-radius: 35px 35px 0 0;
      background: transparent;
      color: #25282e;
      font-size: 23px;
      line-height: 1.5;
    }

    .composer textarea::placeholder {
      color: #a8adb6;
      opacity: 1;
    }

    .composer-toolbar {
      position: absolute;
      right: 29px;
      bottom: 18px;
      left: 29px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .round-tool {
      display: grid;
      place-items: center;
      width: 43px;
      height: 43px;
      padding: 0;
      border: 1px solid #d8dbe1;
      border-radius: 50%;
      background: #fff;
    }

    .plus-symbol {
      position: relative;
      width: 19px;
      height: 19px;
    }

    .plus-symbol::before,
    .plus-symbol::after {
      position: absolute;
      top: 9px;
      left: 1px;
      width: 17px;
      height: 1.5px;
      background: #1d2025;
      content: "";
    }

    .plus-symbol::after {
      transform: rotate(90deg);
    }

    .thinking-tool {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 43px;
      padding: 0 17px;
      border: 1px solid #d8dbe1;
      border-radius: 22px;
      background: #fff;
      font-size: 17px;
    }

    .spark-icon {
      font-size: 23px;
      line-height: 1;
    }

    .plain-icon-button {
      display: grid;
      place-items: center;
      width: 43px;
      height: 43px;
      padding: 0;
      border: 0;
      background: transparent;
    }

    .send-button {
      display: grid;
      place-items: center;
      width: 43px;
      height: 43px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, #aebfff 5%, #8098ff 95%);
      color: #fff;
    }

    .team-carousel {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 25px;
      height: 104px;
      color: #c2c4c9;
      white-space: nowrap;
    }

    .carousel-arrow {
      display: grid;
      place-items: center;
      flex: 0 0 32px;
      width: 32px;
      height: 32px;
      color: #a6aab0;
      font-size: 30px;
      font-weight: 300;
    }

    .team-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
    }

    .team-item.active {
      color: #292c31;
    }

    .team-badge {
      display: grid;
      place-items: center;
      flex: 0 0 31px;
      width: 31px;
      height: 31px;
      border-radius: 50%;
      background: #eff0f2;
      color: #b6b8bd;
      font-size: 16px;
      font-weight: 650;
    }

    .team-item.active .team-badge {
      background: #2d3035;
      color: #fff;
    }

    .prompt-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px 25px;
      padding: 0 55px;
    }

    .prompt-chip {
      min-height: 43px;
      padding: 8px 25px;
      border: 1px solid #e0e2e7;
      border-radius: 23px;
      background: rgba(255, 255, 255, 0.86);
      font-size: 19px;
      line-height: 25px;
      white-space: nowrap;
    }

    @media (max-width: 1450px) {
      :root {
        --sidebar-width: 300px;
      }

      .sidebar {
        padding-top: 23px;
      }

      .logo {
        font-size: 34px;
      }

      .workspace {
        width: min(970px, calc(100% - 70px));
      }

      .hero-title {
        margin-bottom: 35px;
        font-size: 35px;
      }

      .team-carousel {
        gap: 15px;
      }

      .team-item {
        font-size: 15px;
      }

      .prompt-chip {
        font-size: 16px;
      }
    }

    @media (max-height: 760px) {
      .sidebar {
        padding-top: 13px;
      }

      .brand-row {
        margin-bottom: 10px;
      }

      .new-chat {
        margin-bottom: 7px;
      }

      .menu-item {
        height: 42px;
      }

      .workspace {
        transform: translate(-50%, -46%);
      }

      .hero-title {
        margin-bottom: 23px;
      }

      .team-carousel {
        height: 80px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }


    /* Authoritative screenshot calibration: 1917x964 output at the user's 100% browser environment */
    :root {
      --sidebar-width: 243px;
      --shadow: 0 8px 22px rgba(30, 38, 58, 0.045);
    }

    .app-shell { min-width: 900px; }
    .sidebar { padding: 0 10px 70px; overflow: visible; z-index: 5; }
    .brand-row { height: 58px; padding: 0 2px 0 4px; margin: 0; }
    .logo { margin: 0; font-size: 28px; letter-spacing: -1.3px; }
    .logo .x-mark { font-size: 19px; }
    .collapse-button, .collapse-button svg { width: 22px; height: 22px; }

    .new-chat {
      width: 223px;
      height: 32px;
      gap: 7px;
      padding: 0 12px;
      margin: 10px 0 10px;
      border-radius: 6px;
      font-size: 14px;
    }
    .new-chat svg { width: 16px; height: 16px; }

    .menu-list { gap: 6px; margin-bottom: 0; }
    .menu-item { height: 30px; padding: 0 14px; font-size: 14px; }
    .menu-icon { flex-basis: 18px; width: 18px; height: 18px; margin-right: 9px; }
    .letter-icon { font-size: 12px; }
    .menu-icon svg { width: 18px; height: 18px; }
    .menu-chevron { font-size: 15px; }

    .sidebar-section { margin-top: 14px; }
    .section-title-row { min-height: 28px; padding: 0 4px; font-size: 13px; font-weight: 400; }
    .section-title-row:hover { background: transparent; }
    .section-title-action, .section-title-action svg { width: 15px; height: 15px; }
    .group-row, .more-row { height: 24px; padding: 0 5px 0 22px; font-size: 12px; font-weight: 400; }
    .new-group-row { padding-left: 3px; }
    .new-group-plus { width: 18px; margin-right: 5px; font-size: 18px; }
    .group-more-button, .history-more-button { width: 22px; height: 20px; font-size: 14px; }
    .more-row { gap: 9px; padding-left: 6px; }
    .more-arrow { width: 8px; height: 8px; }

    .group-action-menu {
      position: absolute;
      top: 0;
      left: calc(100% - 12px);
      z-index: 80;
      width: 92px;
      padding: 3px;
      border-radius: 5px;
      box-shadow: 0 5px 15px rgba(25, 31, 45, 0.12);
    }
    .action-menu-item { gap: 6px; height: 24px; padding: 0 6px; font-size: 11px; }
    .action-menu-item svg { width: 14px; height: 14px; }

    .history-section { margin-top: 14px; }
    .history-period { padding: 7px 4px 3px; color: #8a8f99; font-size: 11px; font-weight: 400; }
    .history-row { height: 26px; padding: 0 3px 0 4px; font-size: 12px; font-weight: 400; }

    .sidebar-footer { right: 10px; bottom: 14px; left: 10px; height: 38px; padding: 0 3px; }
    .avatar { flex-basis: 32px; width: 32px; height: 32px; }
    .phone { margin-left: 6px; font-size: 12px; }
    .footer-actions { gap: 7px; }
    .footer-icon, .footer-icon.team { width: 18px; height: 18px; background: transparent; }
    .footer-icon svg, .footer-icon.team svg { width: 16px; height: 16px; }

    .group-context-bar {
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 62px;
      padding: 0 28px 0 32px;
      border-bottom: 1px solid #e7e9ee;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(10px);
    }

    .group-context-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: #1f2329;
      font-size: 16px;
      font-weight: 650;
    }

    .group-context-title svg { flex: 0 0 22px; width: 22px; height: 22px; color: #60656e; }
    .group-context-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-context-title[data-group-link] {
      padding: 0;
      border: 0;
      background: transparent;
      cursor: default;
    }
    .group-context-actions { display: flex; align-items: center; gap: 8px; margin-left: 18px; }

    .context-share-button,
    .context-config-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 34px;
      padding: 0 12px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #20242a;
      font-size: 14px;
      cursor: default;
    }

    .context-share-button svg,
    .context-config-button svg { width: 18px; height: 18px; }
    .context-share-button:hover, .context-config-button:hover { background: #f2f3f5; }

    .config-panel {
      position: fixed;
      z-index: 90;
      display: none;
      width: 332px;
      max-height: calc(100vh - 92px);
      border: 1px solid #e1e4ea;
      border-radius: 14px;
      background: #f8f9fb;
      overflow: hidden;
      box-shadow: 0 18px 42px rgba(28, 35, 50, 0.14);
    }

    .app-shell.is-config-open .config-panel { display: block; }
    .config-panel-scroll { max-height: calc(100vh - 92px); padding: 20px 14px 24px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #d8dbe2 transparent; }
    .app-shell.is-config-open:not(.is-collapsed) .group-detail-inner {
      width: min(660px, calc(100% - 410px));
      margin-right: 360px;
      margin-left: auto;
    }
    .app-shell.is-config-open:not(.is-collapsed) .group-detail .group-composer { right: 0; }

    .config-card {
      position: relative;
      padding: 18px 16px;
      border: 1px solid #e2e4e9;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 5px 16px rgba(32, 38, 52, 0.035);
    }

    .config-card + .config-card { margin-top: 14px; }
    .config-card-header, .config-section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .config-card-header { margin-bottom: 14px; }
    .config-card-title, .config-section-title { margin: 0; color: #282c32; font-weight: 700; line-height: 1.35; }
    .config-card-title { font-size: 16px; }
    .config-section-title { font-size: 14px; }
    .config-section { position: relative; padding: 14px 0 0; }
    .config-section:first-of-type { padding-top: 0; }
    .config-section + .config-section { margin-top: 16px; border-top: 1px solid #eef0f3; }
    .config-section-head { margin-bottom: 7px; }
    .config-desc, .config-empty { margin: 0; color: #8a8f99; font-size: 13px; line-height: 1.55; }
    .config-empty { margin-top: 10px; padding: 11px 12px; border-radius: 10px; background: #f7f8fa; color: #a0a5ae; }
    .config-value { margin-top: 10px; padding: 12px; border-radius: 10px; background: #f7f8fa; color: #333840; font-size: 13px; line-height: 1.65; white-space: pre-wrap; }

    .config-add-button,
    .config-save-button,
    .config-cancel-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      border-radius: 9px;
      font-size: 13px;

    function renderTeams(){teamCarouselElement.innerHTML=`<span class="carousel-arrow">${icons.carouselLeft}</span>${quickTeams.map(t=>`<div class="team-item ${t.active?"active":""}"><span class="team-badge">${t.badge}</span><span>${t.label}</span></div>`).join("")}<span class="carousel-arrow">${icons.carouselRight}</span>`}

    function renderConfigPanel(){groupConfigPanel.innerHTML=`<div class="config-panel-scroll"><article class="config-card">${textConfigSection("businessGoal","业务目标","明确当前分组下所有对话需要共同完成的目标。","暂未设置业务目标","帮助用户完成产品设计需求分析与原型方案输出。")}${textConfigSection("instructions","指令","设置当前分组下所有对话都需要遵循的回复规则。","暂未添加指令","回复时优先从产品经理视角分析。\n输出内容需要结构清晰，适合直接用于需求文档。\n避免过度发散，优先给出可落地方案。")}</article><article class="config-card">${dropdownConfigSection("files","文件资源","上传文件或添加网页资源，供当前分组下的所有对话使用。","暂未添加文件或资源",["上传文件","添加网页链接"])}${dropdownConfigSection("skills","技能","添加可在当前分组中复用的技能或工作流。","暂未添加技能",["添加已有技能","创建新技能"])}</article><article class="config-card"><header class="config-card-header"><h2 class="config-card-title">定时任务</h2>${configAddButton("menu-tasks")}</header><div class="task-card-body"><div><p class="config-desc">在当前分组中按设定时间自动运行任务。</p><p class="config-empty">暂未设置定时任务</p></div><div class="config-ghost-icon">${icons.calendar}</div></div>${dropdownMenu("tasks",["新建定时任务","查看任务模板"])}</article></div>`}
    function startConfigEdit(field){groupConfigState.editing=field;groupConfigState.activeMenu=null;groupConfigState.editDraft=field==="businessGoal"?(groupConfigState.businessGoal||"帮助用户完成产品设计需求分析与原型方案输出。"):(groupConfigState.instructions||"回复时优先从产品经理视角分析。\n输出内容需要结构清晰，适合直接用于需求文档。\n避免过度发散，优先给出可落地方案。");renderConfigPanel();const input=groupConfigPanel.querySelector(`[data-config-field="${field}"]`);if(input){input.focus();input.setSelectionRange(input.value.length,input.value.length)}}
    function saveConfigEdit(field){const input=groupConfigPanel.querySelector(`[data-config-field="${field}"]`);if(input){groupConfigState[field]=input.value.trim()}groupConfigState.editing=null;groupConfigState.editDraft="";renderConfigPanel()}

    function openGroupConfigPanel(trigger){if(!selectedGroupId)return;if(appShell.classList.contains("is-config-open")){closeGroupConfigPanel();return}groupConfigState.activeMenu=null;appShell.classList.add("is-config-open");renderConfigPanel();const bar=trigger?.closest(".group-context-bar");const r=bar?.getBoundingClientRect();const top=Math.round(r?r.bottom:62);groupConfigPanel.style.left="";groupConfigPanel.style.right="0px";groupConfigPanel.style.top=`${top}px`;groupConfigPanel.style.maxHeight=`calc(100vh - ${top}px)`;const scroll=groupConfigPanel.querySelector(".config-panel-scroll");if(scroll)scroll.style.maxHeight=`calc(100vh - ${top}px)`}

    function renderConversationDetail(){groupDetail.innerHTML=`${groupContextBar(getGroup("group2"))}<section class="conversation-detail-view" aria-label="会话详情"><div class="conversation-detail-scroll"><div class="conversation-detail-inner"><div class="conversation-user-bubble">帮我梳理一下你各个部分的功能及使用思路</div><div class="conversation-agent-head"><div class="conversation-agent-avatar">${icons.think}</div><div class="conversation-agent-title">数字团队产品设计团队</div></div><p class="conversation-lead">本计划旨在通过调用三位核心 Agent，分别获取其功能定义、交互模式及评审标准，最后由协调器汇总整理成一份清晰的功能及使用思路指南。</p><div class="task-assign"><div class="task-assign-head"><span class="task-check">✓</span><span>分配任务给：</span><span class="task-avatars"><span class="task-avatar">人</span><span class="task-avatar">人</span><span class="task-avatar">人</span></span><span>※</span></div><div class="task-lines"><div class="task-line"><span class="task-role">规范答疑顾问</span><span class="task-copy">1. 请简述你的核心功能定位、主要解决的痛点以及用户在使用你进行规范查询时的最佳实践思路。</span></div><div class="task-line"><span class="task-role">PRD 共创伙伴</span><span class="task-copy">2. 请简述你的核心功能定位、PRD 生成的交互流程（如何追问、如何处理未知字段）以及用户与你协作产出 PRD 的最佳方式。</span></div><div class="task-line"><span class="task-role">PRD 评审专家</span><span class="task-copy">3. 请简述你的核心功能定位、评审依据（附录 B/C）、输出报告的结构以及用户如何利用你的反馈进行 PRD 迭代优化。</span></div><div class="task-line"><span class="task-role">团队主管</span><span class="task-copy">4. 收集上述三位 Agent 的回复，综合整理成一份结构清晰的“各部分功能及使用思路”指南。</span></div></div></div></div></div><div class="conversation-static-composer"><div class="conversation-composer-placeholder">给 X 发送消息或输入@唤起团队</div><div class="conversation-composer-actions"><div class="conversation-tool-left"><button class="conversation-round-button" type="button">+</button><button class="conversation-chip-button" type="button">${icons.think}<span>深度思考</span></button><button class="conversation-chip-button" type="button">${icons.sparkle}<span>常用指令</span></button></div><div class="conversation-tool-right"><button class="conversation-round-button" type="button">⌕</button><button class="conversation-send-button" type="button">${icons.sparkle}</button></div></div></div><div class="conversation-disclaimer">内容由AI生成，仅供参考，你据此所作判断及操作均由你自行承担责任。</div></section>`}
    function showConversationDetail(){appShell.classList.remove("is-config-open");selectedGroupId="group2";modelLabel.hidden=true;homeWorkspace.hidden=true;groupDetail.hidden=false;appShell.classList.add("is-conversation-detail");renderConversationDetail();renderGroups();closeGroupMenu();closeConversationMenus();closeCollapsedPanel()}

    function groupContextBar(g,showGroupName=true){const title=showGroupName&&g?`<button class="group-context-title" type="button" data-group-link="${g.id}"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="5" y="3" width="14" height="18" rx="1.8" stroke="currentColor" stroke-width="1.9"/><path d="M8.2 7.6H15.8M8.2 12H15.8M8.2 16.4H15.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="square"/><path d="M14.6 7.6H15.8M14.6 12H15.8M14.6 16.4H15.8" stroke="currentColor" stroke-width="3" stroke-linecap="square"/></svg><span class="group-context-name">${g.name}</span></button>`:`<div class="group-context-title" aria-hidden="true"></div>`;const trigger=g?` data-config-trigger="group"`:"";return `<header class="group-context-bar">${title}<div class="group-context-actions"><button class="context-share-button" type="button">${icons.share}<span>分享</span></button><button class="context-config-button" type="button"${trigger} aria-label="配置"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6.5H20M4 12H20M4 17.5H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="9" cy="6.5" r="2.6" fill="var(--surface)" stroke="currentColor" stroke-width="2"/><circle cx="15" cy="12" r="2.6" fill="var(--surface)" stroke="currentColor" stroke-width="2"/><circle cx="9" cy="17.5" r="2.6" fill="var(--surface)" stroke="currentColor" stroke-width="2"/></svg><span>配置</span></button></div></header>`}
    function renderGroupDetail(g){const body=g.conversations.length?`<div class="group-conversation-list">${g.conversations.map(c=>`<div class="detail-conversation-row" data-current-group-id="${g.id}"><div class="detail-conversation-copy"><div class="detail-conversation-title">${c.title}</div><div class="detail-conversation-summary">${c.summary}</div></div><time class="detail-conversation-time">${c.time}</time><button class="detail-conversation-more" type="button"></button></div>`).join("")}</div>`:`<div class="group-empty-state"><div class="empty-document-icon">${icons.empty}</div><div class="group-empty-text">\u65b0\u5efa\u5bf9\u8bdd\u6216\u79fb\u5165\u5386\u53f2\u8bb0\u5f55</div></div>`;groupDetail.innerHTML=`${groupContextBar(g,false)}<div class="group-detail-inner"><header class="group-detail-header"><h1 class="group-detail-title">${g.name}</h1><span class="group-detail-divider"></span><button class="group-header-action">${icons.search}</button><button class="group-header-action">${icons.edit}</button><button class="group-header-action">${icons.delete}</button></header>${body}${composer(g)}</div>`;groupDetail.querySelectorAll(".detail-conversation-row").forEach(row=>row.addEventListener("click",e=>{if(e.target.closest(".detail-conversation-more"))return;showConversationDetail()}));groupDetail.querySelectorAll(".detail-conversation-more").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();openConversationMenu(b.closest(".detail-conversation-row"),b)}))}
    function showGroupDetail(id,expand=false){const g=getGroup(id);if(!g)return;appShell.classList.remove("is-conversation-detail");appShell.classList.remove("is-config-open");selectedGroupId=id;modelLabel.hidden=true;homeWorkspace.hidden=true;groupDetail.hidden=false;renderGroupDetail(g);renderGroups();closeCollapsedPanel();if(expand)setCollapsed(false)}

    function openGroupActionMenu(row,context){closeGroupMenu();closeConversationMenus();activeGroupRow=row;row.classList.add("menu-open");const r=row.getBoundingClientRect();actionMenu.hidden=false;actionMenu.style.position="fixed";actionMenu.style.left=`${Math.min(innerWidth-actionMenu.offsetWidth-6,r.right+(context==="panel"?2:5))}px`;actionMenu.style.top=`${Math.max(6,Math.min(r.top,innerHeight-actionMenu.offsetHeight-6))}px`}
    function closeConversationGroupMenu(){clearTimeout(submenuCloseTimer);conversationGroupMenu.hidden=true;moveConversationItem.setAttribute("aria-expanded","false")}

    function openConversationGroupMenu(){clearTimeout(submenuCloseTimer);if(conversationActionMenu.hidden)return;const ar=conversationActionMenu.getBoundingClientRect(),ir=moveConversationItem.getBoundingClientRect();const currentGroupId=activeConversationRow?.dataset.currentGroupId||"";const groups=currentGroupId?conversationGroups.filter(g=>g.id!==currentGroupId):conversationGroups;conversationGroupMenuList.innerHTML=groups.map(g=>`<button class="conversation-group-item" type="button">${g.name}</button>`).join("");conversationGroupMenu.hidden=false;conversationGroupMenu.style.position="fixed";conversationGroupMenu.style.left=`${ar.right-1}px`;const h=conversationGroupMenu.offsetHeight;conversationGroupMenu.style.top=`${ir.top+h>innerHeight?ar.bottom-h:ir.top}px`;moveConversationItem.setAttribute("aria-expanded","true")}

    document.addEventListener("click",e=>{const groupLink=e.target.closest("[data-group-link]");if(groupLink){e.stopPropagation();showGroupDetail(groupLink.dataset.groupLink);return}const configTrigger=e.target.closest("[data-config-trigger=\"group\"]");if(configTrigger){e.stopPropagation();openGroupConfigPanel(configTrigger);return}if(!actionMenu.contains(e.target))closeGroupMenu();if(!conversationActionMenu.contains(e.target)&&!conversationGroupMenu.contains(e.target))closeConversationMenus();if(!collapsedGroupPanel.contains(e.target)&&!collapsedGroupButton.contains(e.target))closeCollapsedPanel();if(!groupConfigPanel.contains(e.target))closeConfigMenus()});
    actionMenu.addEventListener("click",e=>e.stopPropagation());conversationActionMenu.addEventListener("click",e=>e.stopPropagation());conversationGroupMenu.addEventListener("click",e=>e.stopPropagation());collapsedGroupPanel.addEventListener("click",e=>e.stopPropagation());
    groupConfigPanel.addEventListener("click",e=>{const button=e.target.closest("[data-config-action]");if(!button)return;const action=button.dataset.configAction;if(action==="edit-businessGoal")startConfigEdit("businessGoal");else if(action==="edit-instructions")startConfigEdit("instructions");else if(action==="save-edit")saveConfigEdit(button.dataset.field);else if(action==="cancel-edit")cancelConfigEdit();else if(action.startsWith("menu-"))toggleConfigMenu(action.replace("menu-",""))});
