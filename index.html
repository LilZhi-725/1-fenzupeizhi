<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xGOS.AI - AI运营团队工作台</title>
  <style>
    :root {
      --sidebar-width: 362px;
      --sidebar-bg: #f0f4ff;
      --page-bg: #fbfcfe;
      --surface: #ffffff;
      --text: #18191c;
      --muted: #9a9ea8;
      --line: #e4e6eb;
      --hover: rgba(45, 54, 74, 0.065);
      --primary: #2563eb;
      --danger: #f5222d;
      --shadow: 0 14px 34px rgba(30, 38, 58, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background: var(--page-bg);
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      color: inherit;
    }

    svg {
      display: block;
    }

    .app-shell {
      display: flex;
      width: 100%;
      height: 100vh;
      min-width: 980px;
      overflow: hidden;
      border: 1px solid #d9dce3;
      border-radius: 14px;
      background: var(--page-bg);
    }

    .sidebar {
      position: relative;
      flex: 0 0 var(--sidebar-width);
      width: var(--sidebar-width);
      height: 100%;
      padding: 28px 14px 92px;
      background: var(--sidebar-bg);
      overflow: hidden;
    }

    .sidebar-scroll {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
    }

    .sidebar-scroll::-webkit-scrollbar {
      display: none;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 7px 0 5px;
      margin-bottom: 24px;
    }

    .logo {
      font-size: 40px;
      line-height: 1;
      font-weight: 650;
      letter-spacing: -2.1px;
      color: #303237;
      white-space: nowrap;
    }

    .logo .x-mark {
      margin-right: 2px;
      font-size: 27px;
      font-weight: 500;
    }

    .collapse-button {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #595d64;
      cursor: default;
    }

    .new-chat {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      height: 49px;
      padding: 0 18px;
      margin-bottom: 18px;
      border: 0;
      border-radius: 7px;
      background: #fff;
      color: #2d5eff;
      font-size: 20px;
      cursor: default;
      box-shadow: 0 1px 1px rgba(45, 94, 255, 0.02);
    }

    .menu-list {
      display: grid;
      gap: 3px;
      margin-bottom: 15px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      height: 51px;
      padding: 0 18px;
      border-radius: 7px;
      font-size: 20px;
      user-select: none;
    }

    .menu-icon {
      display: grid;
      place-items: center;
      flex: 0 0 25px;
      width: 25px;
      height: 25px;
      margin-right: 15px;
      color: #27292d;
    }

    .letter-icon {
      border-radius: 50%;
      background: #292b2f;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      font-style: italic;
      line-height: 1;
    }

    .menu-chevron {
      margin-left: auto;
      color: #3c4047;
    }

    .sidebar-section {
      margin-top: 5px;
    }

    .section-title-row,
    .group-row,
    .history-row,
    .more-row {
      border-radius: 6px;
      transition: background-color 120ms ease;
    }

    .section-title-row:hover,
    .group-row:hover,
    .history-row:hover,
    .more-row:hover {
      background: var(--hover);
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 38px;
      padding: 0 15px;
      font-size: 18px;
      font-weight: 650;
    }

    .section-title-action {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      color: #666a72;
    }

    .group-list {
      position: relative;
    }

    .group-row,
    .more-row {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      height: 36px;
      padding: 0 14px 0 49px;
      border: 0;
      background: transparent;
      font-size: 16px;
      text-align: left;
      cursor: default;
    }

    .new-group-row {
      padding-left: 19px;
    }

    .new-group-plus {
      width: 24px;
      margin-right: 8px;
      font-size: 27px;
      font-weight: 300;
      line-height: 1;
      color: #3c4047;
    }

    .group-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .group-more-button,
    .history-more-button {
      display: grid;
      place-items: center;
      width: 30px;
      height: 28px;
      margin-left: auto;
      padding: 0;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: #4c5058;
      font-size: 20px;
      line-height: 1;
      letter-spacing: 1px;
      opacity: 0;
      cursor: pointer;
    }

    .group-row:hover .group-more-button,
    .group-row.menu-open .group-more-button,
    .history-row:hover .history-more-button,
    .history-row.menu-open .history-more-button {
      opacity: 1;
    }

    .group-more-button:hover,
    .history-more-button:hover {
      background: rgba(49, 56, 72, 0.08);
    }

    .more-row {
      gap: 13px;
      padding-left: 20px;
      cursor: pointer;
    }

    .more-row[hidden] {
      display: none;
    }

    .more-arrow {
      width: 12px;
      height: 12px;
      border-right: 1.5px solid #4c5058;
      border-bottom: 1.5px solid #4c5058;
      transform: rotate(45deg) translateY(-3px);
      transition: transform 160ms ease;
    }

    .more-row.is-expanded .more-arrow {
      transform: rotate(225deg) translate(-2px, -1px);
    }

    .group-action-menu {
      position: fixed;
      z-index: 50;
      width: 142px;
      padding: 5px;
      border: 1px solid #e0e2e7;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(25, 31, 45, 0.12);
    }

    .group-action-menu[hidden] {
      display: none;
    }

    .action-menu-item {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      height: 37px;
      padding: 0 10px;
      border: 0;
      border-radius: 5px;
      background: transparent;
      font-size: 15px;
      text-align: left;
      white-space: nowrap;
      cursor: default;
    }

    .action-menu-item:hover {
      background: #f4f5f7;
    }

    .action-menu-item + .action-menu-item {
      border-radius: 0;
    }

    .action-menu-item.danger {
      color: var(--danger);
    }

    .history-section {
      margin-top: 8px;
    }

    .history-period {
      padding: 10px 15px 6px;
      color: #969ba5;
      font-size: 15px;
    }

    .history-row {
      display: flex;
      align-items: center;
      height: 38px;
      padding: 0 9px 0 18px;
      font-size: 16px;
    }

    .history-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-footer {
      position: absolute;
      right: 14px;
      bottom: 17px;
      left: 14px;
      display: flex;
      align-items: center;
      height: 55px;
      padding: 0 5px;
      background: var(--sidebar-bg);
    }

    .avatar {
      flex: 0 0 48px;
      width: 48px;
      height: 48px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle at 62% 36%, #f4d3bb 0 11%, transparent 12%),
        radial-gradient(circle at 54% 48%, #945c3d 0 24%, transparent 25%),
        linear-gradient(135deg, #244c52, #d8aa76);
    }

    .phone {
      min-width: 0;
      margin-left: 8px;
      color: #464a52;
      font-size: 17px;
      white-space: nowrap;
    }

    .footer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .footer-icon {
      display: grid;
      place-items: center;
      width: 33px;
      height: 33px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: #343840;
    }

    .footer-icon.team {
      width: 48px;
      height: 48px;
      margin-left: -1px;
      background: #e4e9ff;
      color: #5b7cff;
    }

    .main {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      height: 100%;
      background: var(--page-bg);
    }

    .model-label {
      position: absolute;
      top: 41px;
      left: 36px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 17px;
      font-weight: 500;
    }

    .model-arrow {
      width: 8px;
      height: 8px;
      margin-top: -4px;
      border-right: 1.5px solid #222;
      border-bottom: 1.5px solid #222;
      transform: rotate(45deg);
    }

    .workspace {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(1116px, calc(100% - 100px));
      transform: translate(-50%, -43%);
    }

    .hero-title {
      margin: 0 0 43px;
      font-size: 40px;
      font-weight: 650;
      line-height: 1.25;
      letter-spacing: -1.2px;
      text-align: center;
    }

    .composer {
      position: relative;
      height: 187px;
      border: 1px solid #e1e3e8;
      border-radius: 35px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .composer textarea {
      width: 100%;
      height: 115px;
      padding: 26px 31px 10px;
      border: 0;
      outline: 0;
      resize: none;
      border-radius: 35px 35px 0 0;
      background: transparent;
      color: #25282e;
      font-size: 23px;
      line-height: 1.5;
    }

    .composer textarea::placeholder {
      color: #a8adb6;
      opacity: 1;
    }

    .composer-toolbar {
      position: absolute;
      right: 29px;
      bottom: 18px;
      left: 29px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .round-tool {
      display: grid;
      place-items: center;
      width: 43px;
      height: 43px;
      padding: 0;
      border: 1px solid #d8dbe1;
      border-radius: 50%;
      background: #fff;
    }

    .plus-symbol {
      position: relative;
      width: 19px;
      height: 19px;
    }

    .plus-symbol::before,
    .plus-symbol::after {
      position: absolute;
      top: 9px;
      left: 1px;
      width: 17px;
      height: 1.5px;
      background: #1d2025;
      content: "";
    }

    .plus-symbol::after {
      transform: rotate(90deg);
    }

    .thinking-tool {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 43px;
      padding: 0 17px;
      border: 1px solid #d8dbe1;
      border-radius: 22px;
      background: #fff;
      font-size: 17px;
    }

    .spark-icon {
      font-size: 23px;
      line-height: 1;
    }

    .plain-icon-button {
      display: grid;
      place-items: center;
      width: 43px;
      height: 43px;
      padding: 0;
      border: 0;
      background: transparent;
    }

    .send-button {
      display: grid;
      place-items: center;
      width: 43px;
      height: 43px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, #aebfff 5%, #8098ff 95%);
      color: #fff;
    }

    .team-carousel {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 25px;
      height: 104px;
      color: #c2c4c9;
      white-space: nowrap;
    }

    .carousel-arrow {
      display: grid;
      place-items: center;
      flex: 0 0 32px;
      width: 32px;
      height: 32px;
      color: #a6aab0;
      font-size: 30px;
      font-weight: 300;
    }

    .team-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
    }

    .team-item.active {
      color: #292c31;
    }

    .team-badge {
      display: grid;
      place-items: center;
      flex: 0 0 31px;
      width: 31px;
      height: 31px;
      border-radius: 50%;
      background: #eff0f2;
      color: #b6b8bd;
      font-size: 16px;
      font-weight: 650;
    }

    .team-item.active .team-badge {
      background: #2d3035;
      color: #fff;
    }

    .prompt-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px 25px;
      padding: 0 55px;
    }

    .prompt-chip {
      min-height: 43px;
      padding: 8px 25px;
      border: 1px solid #e0e2e7;
      border-radius: 23px;
      background: rgba(255, 255, 255, 0.86);
      font-size: 19px;
      line-height: 25px;
      white-space: nowrap;
    }

    @media (max-width: 1450px) {
      :root {
        --sidebar-width: 300px;
      }

      .sidebar {
        padding-top: 23px;
      }

      .logo {
        font-size: 34px;
      }

      .workspace {
        width: min(970px, calc(100% - 70px));
      }

      .hero-title {
        margin-bottom: 35px;
        font-size: 35px;
      }

      .team-carousel {
        gap: 15px;
      }

      .team-item {
        font-size: 15px;
      }

      .prompt-chip {
        font-size: 16px;
      }
    }

    @media (max-height: 760px) {
      .sidebar {
        padding-top: 13px;
      }

      .brand-row {
        margin-bottom: 10px;
      }

      .new-chat {
        margin-bottom: 7px;
      }

      .menu-item {
        height: 42px;
      }

      .workspace {
        transform: translate(-50%, -46%);
      }

      .hero-title {
        margin-bottom: 23px;
      }

      .team-carousel {
        height: 80px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }


    /* Authoritative screenshot calibration: 1917x964 output at the user's 100% browser environment */
    :root {
      --sidebar-width: 243px;
      --shadow: 0 8px 22px rgba(30, 38, 58, 0.045);
    }

    .app-shell { min-width: 900px; }
    .sidebar { padding: 0 10px 70px; overflow: visible; z-index: 5; }
    .brand-row { height: 58px; padding: 0 2px 0 4px; margin: 0; }
    .logo { margin: 0; font-size: 28px; letter-spacing: -1.3px; }
    .logo .x-mark { font-size: 19px; }
    .collapse-button, .collapse-button svg { width: 22px; height: 22px; }

    .new-chat {
      width: 223px;
      height: 32px;
      gap: 7px;
      padding: 0 12px;
      margin: 10px 0 10px;
      border-radius: 6px;
      font-size: 14px;
    }
    .new-chat svg { width: 16px; height: 16px; }

    .menu-list { gap: 6px; margin-bottom: 0; }
    .menu-item { height: 30px; padding: 0 14px; font-size: 14px; }
    .menu-icon { flex-basis: 18px; width: 18px; height: 18px; margin-right: 9px; }
    .letter-icon { font-size: 12px; }
    .menu-icon svg { width: 18px; height: 18px; }
    .menu-chevron { font-size: 15px; }

    .sidebar-section { margin-top: 14px; }
    .section-title-row { min-height: 28px; padding: 0 4px; font-size: 13px; font-weight: 400; }
    .section-title-row:hover { background: transparent; }
    .section-title-action, .section-title-action svg { width: 15px; height: 15px; }
    .group-row, .more-row { height: 24px; padding: 0 5px 0 22px; font-size: 12px; font-weight: 400; }
    .new-group-row { padding-left: 3px; }
    .new-group-plus { width: 18px; margin-right: 5px; font-size: 18px; }
    .group-more-button, .history-more-button { width: 22px; height: 20px; font-size: 14px; }
    .more-row { gap: 9px; padding-left: 6px; }
    .more-arrow { width: 8px; height: 8px; }

    .group-action-menu {
      position: absolute;
      top: 0;
      left: calc(100% - 12px);
      z-index: 80;
      width: 92px;
      padding: 3px;
      border-radius: 5px;
      box-shadow: 0 5px 15px rgba(25, 31, 45, 0.12);
    }
    .action-menu-item { gap: 6px; height: 24px; padding: 0 6px; font-size: 11px; }
    .action-menu-item svg { width: 14px; height: 14px; }

    .history-section { margin-top: 14px; }
    .history-period { padding: 7px 4px 3px; color: #8a8f99; font-size: 11px; font-weight: 400; }
    .history-row { height: 26px; padding: 0 3px 0 4px; font-size: 12px; font-weight: 400; }

    .sidebar-footer { right: 10px; bottom: 14px; left: 10px; height: 38px; padding: 0 3px; }
    .avatar { flex-basis: 32px; width: 32px; height: 32px; }
    .phone { margin-left: 6px; font-size: 12px; }
    .footer-actions { gap: 7px; }
    .footer-icon, .footer-icon.team { width: 18px; height: 18px; background: transparent; }
    .footer-icon svg, .footer-icon.team svg { width: 16px; height: 16px; }

    .group-context-bar {
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 62px;
      padding: 0 28px 0 32px;
      border-bottom: 1px solid #e7e9ee;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(10px);
    }

    .group-context-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: #1f2329;
      font-size: 16px;
      font-weight: 650;
    }

    .group-context-title svg { flex: 0 0 22px; width: 22px; height: 22px; color: #60656e; }
    .group-context-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-context-title[data-group-link] {
      padding: 0;
      border: 0;
      background: transparent;
      cursor: default;
    }
    .group-context-actions { display: flex; align-items: center; gap: 8px; margin-left: 18px; }

    .context-share-button,
    .context-config-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 34px;
      padding: 0 12px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #20242a;
      font-size: 14px;
      cursor: default;
    }

    .context-share-button svg,
    .context-config-button svg { width: 18px; height: 18px; }
    .context-share-button:hover, .context-config-button:hover { background: #f2f3f5; }

    .config-panel {
      position: fixed;
      z-index: 90;
      display: none;
      width: 332px;
      max-height: calc(100vh - 92px);
      border: 1px solid #e1e4ea;
      border-radius: 14px;
      background: #f8f9fb;
      overflow: hidden;
      box-shadow: 0 18px 42px rgba(28, 35, 50, 0.14);
    }

    .app-shell.is-config-open .config-panel { display: block; }
    .config-panel-scroll { max-height: calc(100vh - 92px); padding: 20px 14px 24px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #d8dbe2 transparent; }
    .app-shell.is-config-open:not(.is-collapsed) .group-detail-inner {
      width: min(660px, calc(100% - 410px));
      margin-right: 360px;
      margin-left: auto;
    }
    .app-shell.is-config-open:not(.is-collapsed) .group-detail .group-composer { right: 0; }

    .config-card {
      position: relative;
      padding: 18px 16px;
      border: 1px solid #e2e4e9;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 5px 16px rgba(32, 38, 52, 0.035);
    }

    .config-card + .config-card { margin-top: 14px; }
    .config-card-header, .config-section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .config-card-header { margin-bottom: 14px; }
    .config-card-title, .config-section-title { margin: 0; color: #282c32; font-weight: 700; line-height: 1.35; }
    .config-card-title { font-size: 16px; }
    .config-section-title { font-size: 14px; }
    .config-section { position: relative; padding: 14px 0 0; }
    .config-section.is-clickable { cursor: pointer; }
    .config-section.is-clickable::after { content: ""; position: absolute; left: -16px; right: -16px; top: 0; bottom: 0; z-index: 0; background: #f5f5f5; opacity: 0; pointer-events: none; transition: opacity .16s ease; }
    .config-section.is-clickable:hover::after { opacity: 1; }
    .config-section.is-clickable:first-of-type::after { top: -18px; bottom: -16px; border-radius: 13px 13px 0 0; }
    .config-section.is-clickable + .config-section.is-clickable::after { bottom: -18px; border-radius: 0 0 13px 13px; }
    .config-section.is-clickable > * { position: relative; z-index: 1; }
    .config-section.is-clickable .config-section-title::after { content: "›"; display: inline-block; margin-left: 6px; color: #4f535a; font-size: 18px; font-weight: 500; line-height: 1; vertical-align: -1px; }
